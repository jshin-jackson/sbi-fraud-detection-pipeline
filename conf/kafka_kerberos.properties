# =============================================================================
# Kafka Kerberos SASL_SSL client configuration
# Used with the --command-config option for kafka-topics.sh,
# kafka-console-producer/consumer, etc.
#
# Example:
#   export KAFKA_OPTS="-Djava.security.auth.login.config=/path/to/jaas.conf"
#   kafka-topics.sh \
#     --bootstrap-server ccycloud-1.jshin.root.comops.site:9093 \
#     --command-config conf/kafka_kerberos.properties \
#     --list
#
# Note: kafka_setup.sh auto-detects the JAAS and truststore paths and generates
#       temporary files, so this file does not need to be edited directly.
# =============================================================================

# Security protocol
security.protocol=SASL_SSL
sasl.mechanism=GSSAPI
sasl.kerberos.service.name=kafka

# JAAS configuration — specify jaas.conf via the KAFKA_OPTS environment variable,
#                      or use sasl.jaas.config directly below.
sasl.jaas.config=com.sun.security.auth.module.Krb5LoginModule required \
  useKeyTab=true \
  storeKey=true \
  keyTab="${KEYTAB}" \
  principal="${PRINCIPAL}";

# SSL Truststore — CDP Auto-TLS
ssl.truststore.location=/var/lib/cloudera-scm-agent/agent-cert/cm-auto-global_truststore.jks
ssl.truststore.password=${TRUSTSTORE_PW}
ssl.truststore.type=JKS

# Connection timeouts
request.timeout.ms=30000
connections.max.idle.ms=540000
