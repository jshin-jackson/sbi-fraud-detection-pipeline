# ================================================================
# SBI Realtime Fraud Detection — Environment Configuration
# Target : Cloudera Internal Test Environment
# ================================================================
# Usage:
#   Shell : source config/env.conf   (exports are automatically applied — propagated to Python child processes)
#   Switch environment: ln -sf config/env.internal.conf config/env.conf
# ================================================================

export ENV_NAME="cloudera-internal"

# ----------------------------------------------------------------
# Kerberos (single account: systest)
# ----------------------------------------------------------------
export KRB_REALM="ROOT.COMOPS.SITE"
export KRB_KDC="ccycloud-1.jshin.root.comops.site"
export PRINCIPAL="systest@ROOT.COMOPS.SITE"
export KEYTAB="/opt/cloudera/systest.keytab"

# ----------------------------------------------------------------
# Auto-TLS certificate paths (CDP standard — same across most environments)
# ----------------------------------------------------------------
export TRUSTSTORE_JKS="/var/lib/cloudera-scm-agent/agent-cert/cm-auto-global_truststore.jks"
export CA_PEM="/var/lib/cloudera-scm-agent/agent-cert/cm-auto-global_cacerts.pem"

# Truststore password (same for all components in Auto-TLS environments)
export TRUSTSTORE_PW="zpXWTjeWPjvNDU4mQnDQPQKn50xfVI9HYX12DSc05x3"

# Kafka installation path
export KAFKA_HOME="/opt/cloudera/parcels/CDH/lib/kafka"

# ----------------------------------------------------------------
# Kafka
# ----------------------------------------------------------------
export KAFKA_BROKERS="ccycloud-1.jshin.root.comops.site:9093,ccycloud-2.jshin.root.comops.site:9093,ccycloud-3.jshin.root.comops.site:9093"
export KAFKA_TOPIC="sbi-fd-transactions-raw"
export KAFKA_TOPIC_DLQ="sbi-fd-transactions-dlq"
export KAFKA_PARTITIONS=6
export KAFKA_RF=3

# ----------------------------------------------------------------
# Hive Metastore (HMS)
# ----------------------------------------------------------------
export HMS_HOST="ccycloud-1.jshin.root.comops.site"
export HMS_PORT="9083"
export HMS_PRINCIPAL="hive/_HOST@ROOT.COMOPS.SITE"

# ----------------------------------------------------------------
# HiveServer2 (beeline / Hue)
# ----------------------------------------------------------------
export HS2_HOST="ccycloud-1.jshin.root.comops.site"
export HS2_PORT="10000"
export HS2_JDBC_URL="jdbc:hive2://${HS2_HOST}:${HS2_PORT}/;principal=hive/_HOST@${KRB_REALM};ssl=true;sslTrustStore=${TRUSTSTORE_JKS};trustStorePassword=${TRUSTSTORE_PW}"

# ----------------------------------------------------------------
# Apache Ozone (OFS)
# ----------------------------------------------------------------
export OZONE_OM_SERVICE_ID="ozone1780551922"
export OZONE_OM_ADDRESS="ccycloud-1.jshin.root.comops.site:9862"
export OZONE_VOLUME="firstvolume"
export OZONE_BUCKET_RAW="sbi-raw"
export OZONE_BUCKET_CURATED="sbi-curated"

# OFS base path
export OFS_BASE="ofs://${OZONE_OM_SERVICE_ID}/${OZONE_VOLUME}"

# ----------------------------------------------------------------
# Spark (Ozone JAR paths)
# ----------------------------------------------------------------
export SPARK_OZONE_JARS="/opt/cloudera/parcels/CDH/jars/ozone-filesystem-hadoop3-1.4.0.7.3.1.600-325.jar:/opt/cloudera/parcels/CDH/jars/ozone-filesystem-common-1.4.0.7.3.1.600-325.jar"
export HADOOP_CONF_DIR="/etc/hadoop/conf"
export YARN_CONF_DIR="/etc/hadoop/conf"

# Spark Iceberg/Kafka JAR paths (aligned with CM Safety Valve)
export ICEBERG_JAR="/opt/cloudera/parcels/CDH/jars/iceberg-spark-runtime-3.5_2.12-1.5.2.7.3.1.600-325.jar"
export KAFKA_SPARK_JAR="/opt/cloudera/parcels/CDH/jars/spark-sql-kafka-0-10_2.12-3.5.4.7.3.1.600-325.jar"
export KAFKA_CLIENTS_JAR="/opt/cloudera/parcels/CDH/jars/kafka-clients-3.4.1.7.3.1.600-325.jar"

# ----------------------------------------------------------------
# Data generation settings
# ----------------------------------------------------------------
export DATA_OUTPUT_DIR="/tmp/fraud-data"
export DEMO_ROWS=10000
export DEMO_RATE=100

# Fraud detection thresholds
export FRAUD_HIGH_AMOUNT_THRESHOLD=500000       # ₹5 lakh
export FRAUD_VELOCITY_TXN_COUNT=3               # 3 or more within 5 minutes
export FRAUD_VELOCITY_WINDOW_SEC=300
export FRAUD_GEO_DISTANCE_KM=500                # over 500 km
export FRAUD_GEO_TIME_WINDOW_SEC=1800           # within 30 minutes

# Spark ETL offset file
export KAFKA_OFFSET_FILE="/root/sbi-kafka-offsets.json"
