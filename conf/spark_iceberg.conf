# =============================================================================
# Spark + Iceberg + Ozone(S3A) + Kerberos 설정
# 검증 환경: Python 3.9.21 / OpenJDK 11 / RHEL 9.6 / Cloudera CDP 7.3.1 (Spark 3.5)
# Air-gapped 전용 — 인터넷 연결 없이 CDP 파슬 내 로컬 JAR을 사용합니다.
#
# 적용 방법:
#   spark-submit --properties-file /path/to/conf/spark_iceberg.conf ...
#
# JAR 파일 실제 경로 확인:
#   find /opt/cloudera/parcels/CDH/jars/ -name "iceberg-spark-runtime*.jar"
#   find /opt/cloudera/parcels/CDH/jars/ -name "spark-sql-kafka*.jar"
# =============================================================================

# ---------------------------------------------------------------------------
# Air-gapped 환경 — CDP 파슬 내 로컬 JAR 경로
# CDP 7.3.1 (Spark 3.5, Iceberg 1.5.2, Scala 2.12) 실측 파일명 기준
# ---------------------------------------------------------------------------
spark.jars=/opt/cloudera/parcels/CDH/jars/iceberg-spark-runtime-3.5_2.12-1.5.2.7.3.1.600-325.jar,\
/opt/cloudera/parcels/CDH/jars/spark-sql-kafka-0-10_2.12-3.5.4.7.3.1.600-325.jar,\
/opt/cloudera/parcels/CDH/jars/kafka-clients-3.4.1.7.3.1.600-325.jar

# ---------------------------------------------------------------------------
# Python 3.9 지정 (RHEL 9.6 기본 python3 = 3.9.21)
# ---------------------------------------------------------------------------
spark.pyspark.python=python3
spark.pyspark.driver.python=python3

# ---------------------------------------------------------------------------
# OpenJDK 11 — Java 모듈 개방 옵션 (Spark 3.x + Java 11 필수)
# RHEL 9.6 기본 JDK: /usr/lib/jvm/java-11-openjdk
# ---------------------------------------------------------------------------
spark.driver.extraJavaOptions=\
  --add-opens=java.base/java.lang=ALL-UNNAMED \
  --add-opens=java.base/java.lang.invoke=ALL-UNNAMED \
  --add-opens=java.base/java.lang.reflect=ALL-UNNAMED \
  --add-opens=java.base/java.io=ALL-UNNAMED \
  --add-opens=java.base/java.net=ALL-UNNAMED \
  --add-opens=java.base/java.nio=ALL-UNNAMED \
  --add-opens=java.base/sun.nio.ch=ALL-UNNAMED \
  --add-opens=java.base/sun.nio.cs=ALL-UNNAMED \
  --add-opens=java.base/sun.security.action=ALL-UNNAMED \
  --add-opens=java.base/sun.util.calendar=ALL-UNNAMED

spark.executor.extraJavaOptions=\
  --add-opens=java.base/java.lang=ALL-UNNAMED \
  --add-opens=java.base/java.lang.invoke=ALL-UNNAMED \
  --add-opens=java.base/java.lang.reflect=ALL-UNNAMED \
  --add-opens=java.base/java.io=ALL-UNNAMED \
  --add-opens=java.base/java.net=ALL-UNNAMED \
  --add-opens=java.base/java.nio=ALL-UNNAMED \
  --add-opens=java.base/sun.nio.ch=ALL-UNNAMED \
  --add-opens=java.base/sun.nio.cs=ALL-UNNAMED \
  --add-opens=java.base/sun.security.action=ALL-UNNAMED \
  --add-opens=java.base/sun.util.calendar=ALL-UNNAMED

# ---------------------------------------------------------------------------
# Iceberg 확장 (HMS 카탈로그)
# ---------------------------------------------------------------------------
spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.spark_catalog=org.apache.iceberg.spark.SparkSessionCatalog
spark.sql.catalog.spark_catalog.type=hive
# HiveServer2 호스트: CM > Hive > Instances 에서 실제 호스트 확인
spark.sql.catalog.spark_catalog.uri=thrift://ccycloud-1.jshin.root.comops.site:9083

# ---------------------------------------------------------------------------
# Ozone S3A 설정 (Auto-TLS 활성화 → HTTPS 엔드포인트, 포트 9879)
# S3G 인증 키: ozone s3 getsecret 명령으로 발급 후 아래 값을 교체하세요.
# ---------------------------------------------------------------------------
# Ozone S3G 호스트: CM > Ozone > Instances 에서 실제 호스트 확인
spark.hadoop.fs.s3a.endpoint=https://ccycloud-1.jshin.root.comops.site:9879
spark.hadoop.fs.s3a.path.style.access=true
spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.connection.ssl.enabled=true
spark.hadoop.fs.s3a.ssl.channel.mode=openssl

# Ozone S3 게이트웨이 인증 (ozone s3 getsecret 출력값으로 교체)
spark.hadoop.fs.s3a.aws.credentials.provider=org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
spark.hadoop.fs.s3a.access.key=REPLACE_WITH_OZONE_ACCESS_KEY
spark.hadoop.fs.s3a.secret.key=REPLACE_WITH_OZONE_SECRET_KEY

# S3A 성능 튜닝
spark.hadoop.fs.s3a.block.size=134217728
spark.hadoop.fs.s3a.multipart.size=67108864
spark.hadoop.fs.s3a.fast.upload=true
spark.hadoop.fs.s3a.fast.upload.buffer=bytebuffer
spark.hadoop.fs.s3a.threads.max=20
spark.hadoop.fs.s3a.connection.maximum=20

# ---------------------------------------------------------------------------
# Kerberos 인증
# ---------------------------------------------------------------------------
spark.kerberos.keytab=/root/systest.keytab
spark.kerberos.principal=systest@ROOT.COMOPS.SITE
spark.yarn.keytab=/root/systest.keytab
spark.yarn.principal=systest@ROOT.COMOPS.SITE

# ---------------------------------------------------------------------------
# Iceberg 쓰기 최적화
# ---------------------------------------------------------------------------
spark.sql.iceberg.merge-on-read.enabled=true
spark.sql.iceberg.handle-timestamp-without-timezone=true

# ---------------------------------------------------------------------------
# Spark SQL 최적화
# ---------------------------------------------------------------------------
spark.sql.adaptive.enabled=true
spark.sql.adaptive.coalescePartitions.enabled=true
spark.sql.adaptive.skewJoin.enabled=true
spark.sql.shuffle.partitions=200

# ---------------------------------------------------------------------------
# Streaming 설정
# ---------------------------------------------------------------------------
spark.streaming.checkpoint.dir=s3a://sbi-raw/checkpoints/

# ---------------------------------------------------------------------------
# YARN 실행 설정
# ---------------------------------------------------------------------------
spark.master=yarn
spark.submit.deployMode=cluster
spark.executor.instances=4
spark.executor.cores=2
spark.executor.memory=4g
spark.driver.memory=2g
spark.dynamicAllocation.enabled=true
spark.dynamicAllocation.minExecutors=2
spark.dynamicAllocation.maxExecutors=16
