# =============================================================================
# Kafka Kerberos SASL_SSL 클라이언트 설정
# kafka-topics.sh, kafka-console-producer/consumer 등의 --command-config 옵션에 사용
#
# 사용 예:
#   export KAFKA_OPTS="-Djava.security.auth.login.config=/path/to/jaas.conf"
#   kafka-topics.sh \
#     --bootstrap-server ccycloud-1.jshin.root.comops.site:9093 \
#     --command-config conf/kafka_kerberos.properties \
#     --list
#
# 참고: kafka_setup.sh 는 JAAS 및 truststore 경로를 자동 감지하여
#       임시 파일을 생성하므로 이 파일을 직접 수정할 필요가 없습니다.
# =============================================================================

# 보안 프로토콜
security.protocol=SASL_SSL
sasl.mechanism=GSSAPI
sasl.kerberos.service.name=kafka

# JAAS 설정 — KAFKA_OPTS 환경변수로 jaas.conf를 지정하거나
#              아래 sasl.jaas.config를 직접 사용하세요.
sasl.jaas.config=com.sun.security.auth.module.Krb5LoginModule required \
  useKeyTab=true \
  storeKey=true \
  keyTab="/opt/cloudera/systest.keytab" \
  principal="systest@ROOT.COMOPS.SITE";

# SSL Truststore — CDP Auto-TLS
ssl.truststore.location=/var/lib/cloudera-scm-agent/agent-cert/cm-auto-global_truststore.jks
ssl.truststore.password=zpXWTjeWPjvNDU4mQnDQPQKn50xfVI9HYX12DSc05x3
ssl.truststore.type=JKS

# 연결 타임아웃
request.timeout.ms=30000
connections.max.idle.ms=540000
