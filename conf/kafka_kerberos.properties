# =============================================================================
# Kafka Kerberos SASL_SSL 클라이언트 설정
# kafka-topics.sh, kafka-console-producer/consumer 등의 --command-config 옵션에 사용
#
# 사용 예:
#   kafka-topics.sh --bootstrap-server ccycloud-1.jshin.root.comops.site:9093 \
#                   --command-config /path/to/kafka_kerberos.properties \
#                   --list
# =============================================================================

# 보안 프로토콜
security.protocol=SASL_SSL
sasl.mechanism=GSSAPI
sasl.kerberos.service.name=kafka

# JAAS 설정 (keytab 경로를 실제 환경에 맞게 수정하세요)
sasl.jaas.config=com.sun.security.auth.module.Krb5LoginModule required \
  useKeyTab=true \
  storeKey=true \
  keyTab="/root/systest.keytab" \
  principal="systest@ROOT.COMOPS.SITE";

# SSL 설정 (Auto-TLS)
ssl.truststore.location=/etc/security/certs/truststore.jks
ssl.truststore.password=changeit
ssl.truststore.type=JKS

# 연결 타임아웃
request.timeout.ms=30000
connections.max.idle.ms=540000
